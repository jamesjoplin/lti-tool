name: CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Type check
        run: npm run type-check

      - name: Lint check
        run: npm run lint

      - name: Format check
        run: npm run format

      - name: Build packages
        run: npm run build

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build core package
        run: npm run build --workspace=@lti-tool/core

      - name: Run tests
        run: npx vitest run --coverage --reporter=verbose --exclude="**/*.integration.test.ts"

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [quality, test]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Run core integration tests
        run: npx vitest run packages/core/test/*.integration.test.ts

  adapter-integration:
    name: Adapter Integration (${{ matrix.adapter }})
    runs-on: ubuntu-latest
    needs: [quality]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - adapter: mysql
            database-url: mysql://lti_user:lti_password@127.0.0.1:3306/lti_test
          - adapter: postgresql
            database-url: postgresql://lti_user:lti_password@127.0.0.1:5432/lti_test
          - adapter: d1
            database-url: ''
    services:
      mysql:
        image: ${{ matrix.adapter == 'mysql' && 'mysql:8.0' || '' }}
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: lti_test
          MYSQL_USER: lti_user
          MYSQL_PASSWORD: lti_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      postgresql:
        image: ${{ matrix.adapter == 'postgresql' && 'postgres:16' || '' }}
        env:
          POSTGRES_USER: lti_user
          POSTGRES_PASSWORD: lti_password
          POSTGRES_DB: lti_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -h 127.0.0.1 -U lti_user -d lti_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build core package
        run: npm run build --workspace=@lti-tool/core

      - name: Apply adapter schema
        if: matrix.database-url != ''
        working-directory: packages/${{ matrix.adapter }}
        env:
          DATABASE_URL: ${{ matrix.database-url }}
        run: npx drizzle-kit migrate

      - name: Run adapter integration tests
        env:
          DATABASE_URL: ${{ matrix.database-url }}
        run: npx vitest run packages/${{ matrix.adapter }}/test/*.integration.test.ts

  security:
    name: Security Scan
    if: github.repository_owner == 'lti-tool'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Run npm audit
        run: npm audit --audit-level=high

  ci:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [quality, test, integration, adapter-integration, security]
    if: always() && github.repository_owner == 'lti-tool'
    permissions:
      contents: read
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.quality.result }}" == "success" &&
                "${{ needs.test.result }}" == "success" &&
                "${{ needs.integration.result }}" == "success" &&
                "${{ needs.adapter-integration.result }}" == "success" &&
                "${{ needs.security.result }}" == "success" ]]; then
            echo "All CI jobs passed"
          else
            echo "Some CI jobs failed"
            exit 1
          fi
